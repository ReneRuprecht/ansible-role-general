---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: debian12
    image: "geerlingguy/docker-debian12-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

  - name: debian13
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

  - name: debian12-resolved
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

  - name: debian13-resolved
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /ansible-tmp
      deprecation_warnings: false
  inventory:
    host_vars:
      debian12:
        general_hostname: "debian12"
        general_ignore_hostname_task: true
        general_ignore_ssh_key_deployment: true
        general_ip_address: 10.0.0.1
        general_ignore_dns_resolv_task: true
      debian13:
        general_hostname: "debian13"
        general_ignore_ssh_key_deployment: true
        general_ignore_hostname_task: true
        general_root_setup_enabled: true
        general_root_password: "$$6$$z7JNUrxLDdhOLGTs$$2qQz0meX5KHVtE0wi9RTe2cReg7Y6xiWywzcbnL8.MV7AuJhR5sZXglrAHAT7RQsGgiCP546vJQ3RNkqUN9vk0"
        general_ip_address: 10.0.0.2
        general_ignore_dns_resolv_task: true
      debian12-resolved:
        general_hostname: "debian12.resolved"
        general_ignore_ssh_key_deployment: true
        general_ignore_hostname_task: true
        general_root_setup_enabled: true
        general_root_password: "$$6$$z7JNUrxLDdhOLGTs$$2qQz0meX5KHVtE0wi9RTe2cReg7Y6xiWywzcbnL8.MV7AuJhR5sZXglrAHAT7RQsGgiCP546vJQ3RNkqUN9vk0"
        general_ip_address: 10.0.0.3
      debian13-resolved:
        general_hostname: "debian13.resolved"
        general_ignore_ssh_key_deployment: true
        general_ignore_hostname_task: true
        general_networking:
          - interface: "eth0"
            ip_address: 10.0.0.4
            ip_gateway: 10.0.0.1
          - interface: "eth1"
            ip_address: 11.0.0.5
            ip_gateway: 11.0.0.1
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
verifier:
  name: ansible
